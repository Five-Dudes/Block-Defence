<!DOCTYPE html>
<html>
<body>
<pre id="out">running...</pre>
<iframe id="app" src="./index.html" style="width:0;height:0;border:0"></iframe>
<script>
window.addEventListener('load', () => {
  const frame = document.getElementById('app');
  frame.addEventListener('load', () => {
    setTimeout(() => {
      try {
        const w = frame.contentWindow;
        const towers = w.ALMANAC_TOWER_TYPES || [];
        const results = [];
        for (const type of towers) {
          if (!w.PATH_TOWER_TYPES.has(type)) {
            continue;
          }
          for (const path of [1, 2]) {
            for (const tier of [4, 5]) {
              const overrides = path === 1
                ? { type, path1: tier, path2: 0, level: 1 + tier }
                : { type, path1: 0, path2: tier, level: 1 + tier };
              const tower = w.mockTower(type, overrides);
              const summary = w.towerStatSummary(tower);
              const cost = w.UPGRADE_COSTS[type][`path${path}`][tier - 1];
              const target = cost / 20;
              const gap = Math.abs((summary.dps || 0) - target);
              results.push({ type, path, tier, cost, target, dps: summary.dps || 0, gap });
            }
          }
        }
        results.sort((a, b) => b.gap - a.gap);
        const worst = results.slice(0, 40);
        const failing = results.filter((entry) => entry.gap > 25);
        document.getElementById('out').textContent = JSON.stringify({
          failingCount: failing.length,
          total: results.length,
          worst,
          maxGap: worst[0] ? worst[0].gap : 0
        }, null, 2);
      } catch (error) {
        document.getElementById('out').textContent = 'ERROR\n' + (error && error.stack ? error.stack : String(error));
      }
    }, 1500);
  }, { once: true });
});
</script>
</body>
</html>
